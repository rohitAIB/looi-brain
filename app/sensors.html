<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LOOI · Sensor Decode</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; background: #0d1117; color: #e6edf3; font: 14px/1.4 -apple-system, system-ui, sans-serif;
         display: flex; flex-direction: column; overflow: hidden; }
  header { padding: 6px 10px; background: #161b22; border-bottom: 1px solid #30363d; flex: 0 0 auto; }
  h1 { margin: 0; font-size: 14px; display: inline; }
  .hint { color: #8b949e; font-size: 11px; }
  .warn { color: #f0a020; }
  .bar { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 10px; background: #161b22;
         border-bottom: 1px solid #30363d; flex: 0 0 auto; align-items: center; }
  button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 7px;
           padding: 7px 10px; font-size: 12px; font-weight: 600; touch-action: manipulation; }
  button:active { background: #30363d; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.mark { background: #1f2937; border-color: #374151; }
  button.drive { background: #1d3a5f; border-color: #2b5c93; }
  button#stop { background: #5a1e1e; border-color: #8a2a2a; }
  label.tog { font-size: 11px; color: #8b949e; display: inline-flex; align-items: center; gap: 4px; }
  #status { font-size: 11px; color: #8b949e; padding: 3px 10px; background: #161b22; flex: 0 0 auto;
            border-bottom: 1px solid #30363d; }
  #log { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch;
         padding: 6px 10px 20px; font-family: ui-monospace, Menlo, Consolas, monospace;
         font-size: 12px; white-space: pre-wrap; word-break: break-all; }
  .line { padding: 2px 0; border-bottom: 1px solid #161b22; }
  .t { color: #6e7681; }
  .ch-SENS { color: #58a6ff; }
  .ch-TELE { color: #d29922; }
  .ch-sys  { color: #8b949e; }
  .ch-err  { color: #f85149; }
  .chg { background: #bb8009; color: #0d1117; border-radius: 3px; padding: 0 2px; font-weight: 700; }
  .divider { color: #7ee787; font-weight: 700; }
</style>
</head>
<body>
<header>
  <h1>LOOI · Sensor Decode</h1>
  <span class="hint">Auto-streams sensor lines to Claude (heartbeats skipped).
  <span class="warn">Drive test: on the FLOOR or hold it — not toward a desk edge.</span></span>
</header>

<div class="bar">
  <button id="connect" class="primary">Connect</button>
  <button id="disconnect">Disc</button>
  <label class="tog"><input type="checkbox" id="onlyChanges" checked> changes only</label>
  <button class="mark" data-mark="HAND IN FRONT (ToF)">✋ front</button>
  <button class="mark" data-mark="IDLE baseline">💤 idle</button>
  <button id="flush">📡 Flush now</button>
  <button id="clear">Clear</button>
</div>
<div class="bar">
  <button class="drive" id="fwd">▶ nudge fwd 1s</button>
  <button class="drive" id="fwd2">▶▶ fwd 2s</button>
  <button class="drive" id="back">◀ back</button>
  <button id="stop">◼ STOP</button>
</div>
<div id="status">not connected</div>
<div id="log"></div>

<script type="module">
import { Looi } from './looi.js';

const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const onlyChanges = document.getElementById('onlyChanges');
const looi = new Looi();
const last = {};
const textBuf = [];       // everything (for on-screen / Copy)
const streamBuf = [];     // ONLY sensor-relevant lines → ntfy (no heartbeats)
let t0 = performance.now();
let streaming = false;

// Keep the phone screen awake (screen sleep drops BLE + kills the capture).
let wakeLock = null;
async function keepAwake() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      wakeLock.addEventListener('release', () => { wakeLock = null; });
    }
  } catch (e) { /* unsupported or blocked — ignore */ }
}
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') keepAwake(); });

function stamp() { return (performance.now() - t0).toFixed(0).padStart(6) + 'ms'; }

// stream=true → also queued for ntfy. Auto-scroll only if already at bottom.
function addLine(cls, htmlBody, textBody, stream) {
  const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 50;
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.innerHTML = htmlBody;
  logEl.appendChild(div);
  textBuf.push(textBody);
  if (stream) streamBuf.push(textBody);
  if (atBottom) logEl.scrollTop = logEl.scrollHeight;
}

// sys lines are screen-only by default (heartbeats never stream).
function sys(msg, cls = 'ch-sys', stream = false) {
  addLine(cls, `<span class="t">${stamp()}</span> ${msg}`, `${stamp()}  ${msg}`, stream);
}

function onTelemetry(key, bytes) {
  const prev = last[key];
  const changed = !prev || prev.length !== bytes.length || bytes.some((b, i) => b !== prev[i]);
  last[key] = bytes.slice();
  if (onlyChanges.checked && !changed && prev) return;

  const hex = bytes.map((b, i) => {
    const s = b.toString(16).padStart(2, '0');
    return (prev && prev[i] !== b) ? `<span class="chg">${s}</span>` : s;
  }).join(' ');
  const hexPlain = bytes.map(b => b.toString(16).padStart(2, '0')).join(' ');
  addLine('ch-' + key,
    `<span class="t">${stamp()}</span> <b>${key}</b> [${bytes.length}]  ${hex}`,
    `${stamp()}  ${key}[${bytes.length}]  ${hexPlain}   dec:${bytes.join(',')}`,
    true);                                   // sensor packets DO stream
}

looi.addEventListener('log',          e => sys(e.detail.msg, e.detail.cls === 'err' ? 'ch-err' : 'ch-sys'));  // screen only
looi.addEventListener('connected',    () => { streaming = true;  statusEl.textContent = '● connected — streaming sensor lines'; sys('=== CONNECTED ===', 'divider', true); });
looi.addEventListener('disconnected', () => { streaming = false; statusEl.textContent = '○ disconnected'; sys('=== DISCONNECTED ===', 'ch-err', true); });
looi.addEventListener('battery',      e => sys('battery ' + e.detail.value + '%'));   // screen only
looi.addEventListener('telemetry',    e => onTelemetry(e.detail.key, e.detail.bytes));

document.getElementById('connect').onclick = async () => {
  keepAwake();
  statusEl.textContent = 'connecting…';
  try { await looi.connect(); } catch (e) { sys('connect failed: ' + e.message, 'ch-err'); statusEl.textContent = 'connect failed'; }
};
document.getElementById('disconnect').onclick = () => looi.disconnect();

document.querySelectorAll('button.mark').forEach(b =>
  b.onclick = () => addLine('divider', `<span class="t">${stamp()}</span> ── ${b.dataset.mark} ──`, `\n${stamp()}  ── ${b.dataset.mark} ──`, true));

// ---- Drive controls: tap to nudge (uses the proven gesture methods, auto-stops) ----
function nudge(id, fn, label) {
  document.getElementById(id).onclick = () => {
    addLine('divider', `<span class="t">${stamp()}</span> ── DRIVE ${label} ──`, `\n${stamp()}  ── DRIVE ${label} ──`, true);
    try { fn(); } catch (e) { sys('drive err: ' + e.message, 'ch-err'); }
  };
}
nudge('fwd',  () => looi.forward(1200, 70), 'FWD 1.2s');
nudge('fwd2', () => looi.forward(2000, 80), 'FWD 2s');
nudge('back', () => looi.back(800, 80), 'BACK');
document.getElementById('stop').onclick = () => { try { looi.stop(); } catch {} };

// ---- Auto-stream to the brain-service (reliable local pipe, same endpoint the app uses) ----
// Reads the brain endpoint the Jarvis app stored (same origin), POSTs sensor lines to /sensors →
// server writes them to disk for Claude. Falls back to ntfy only if no brain endpoint is set.
const BRAIN = (() => {
  try { const ep = localStorage.getItem('brainEndpoint'); if (ep) return new URL(ep).origin; } catch {}
  return 'https://laptop-t1irqf8l.tail001138.ts.net';     // brain-service (works when phone is on Tailscale, same as Jarvis)
})();
const NTFY = 'https://ntfy.sh/looi-dbg-r7k39q2x';
let sentIdx = 0, seq = 0, flushing = false, didReset = false;
async function flush(force) {
  if (flushing) return;
  if (!streaming && !force) return;
  const chunk = streamBuf.slice(sentIdx);
  if (!chunk.length) { if (force) statusEl.textContent = 'nothing new to send'; return; }
  flushing = true;
  const end = streamBuf.length;
  const body = chunk.join('\n');
  try {
    if (BRAIN) {
      const q = didReset ? '' : '?reset=1'; didReset = true;      // first flush truncates the log
      const r = await fetch(BRAIN + '/sensors' + q, { method: 'POST', body });
      if (!r.ok) throw new Error('brain ' + r.status);
      sentIdx = end;
      statusEl.textContent = `✅ ${end} line(s) → brain`;
    } else {
      for (let i = 0; i < body.length; i += 1500) { seq++; await fetch(NTFY, { method: 'POST', headers: { Title: `looi-sensors #${seq}` }, body: body.slice(i, i + 1500) }); await new Promise(r => setTimeout(r, 300)); }
      sentIdx = end;
      statusEl.textContent = `📡 ${end} line(s) → ntfy (no brain endpoint set)`;
    }
  } catch (e) { statusEl.textContent = 'stream err: ' + e.message; }
  finally { flushing = false; }
}
setInterval(() => flush(false), 4000);
document.getElementById('flush').onclick = () => flush(true);

sys('ready. Tap Connect.');
</script>
</body>
</html>
