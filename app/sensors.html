<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>LOOI · Sensor Decode</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { margin: 0; background: #0d1117; color: #e6edf3; font: 14px/1.4 -apple-system, system-ui, sans-serif;
         display: flex; flex-direction: column; overflow: hidden; }          /* body never scrolls */
  header { padding: 6px 10px; background: #161b22; border-bottom: 1px solid #30363d; flex: 0 0 auto; }
  h1 { margin: 0; font-size: 14px; display: inline; }
  .hint { color: #8b949e; font-size: 11px; }
  .bar { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 10px; background: #161b22;
         border-bottom: 1px solid #30363d; flex: 0 0 auto; align-items: center; }  /* fixed toolbar */
  button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 7px;
           padding: 7px 10px; font-size: 12px; font-weight: 600; }
  button:active { background: #30363d; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.mark { background: #1f2937; border-color: #374151; }
  label.tog { font-size: 11px; color: #8b949e; display: inline-flex; align-items: center; gap: 4px; }
  #status { font-size: 11px; color: #8b949e; padding: 3px 10px; background: #161b22; flex: 0 0 auto;
            border-bottom: 1px solid #30363d; }
  #log { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch;    /* ONLY the log scrolls */
         padding: 6px 10px 20px; font-family: ui-monospace, Menlo, Consolas, monospace;
         font-size: 12px; white-space: pre-wrap; word-break: break-all; }
  .line { padding: 2px 0; border-bottom: 1px solid #161b22; }
  .t { color: #6e7681; }
  .ch-SENS { color: #58a6ff; }
  .ch-TELE { color: #d29922; }
  .ch-sys  { color: #8b949e; }
  .ch-err  { color: #f85149; }
  .chg { background: #bb8009; color: #0d1117; border-radius: 3px; padding: 0 2px; font-weight: 700; }
  .divider { color: #7ee787; font-weight: 700; }
</style>
</head>
<body>
<header>
  <h1>LOOI · Sensor Decode</h1>
  <span class="hint">— tap marker, then trigger one sensor. Changed bytes highlighted.</span>
</header>

<div class="bar">
  <button id="connect" class="primary">Connect</button>
  <button id="disconnect">Disc</button>
  <label class="tog"><input type="checkbox" id="onlyChanges" checked> changes only</label>
  <button class="mark" data-mark="HAND IN FRONT (ToF / obstacle)">✋ front</button>
  <button class="mark" data-mark="LIFT / EDGE (cliff)">🔺 cliff</button>
  <button class="mark" data-mark="TOUCH / PET">👆 touch</button>
  <button class="mark" data-mark="TILT / PICK UP (IMU)">🔄 tilt</button>
  <button class="mark" data-mark="IDLE baseline">💤 idle</button>
  <button id="send" class="primary">📡 Flush now</button>
  <button id="copy">📋 Copy</button>
  <button id="clear">Clear</button>
</div>
<div id="status">not connected</div>
<div id="log"></div>

<script type="module">
import { Looi } from './looi.js';

const logEl = document.getElementById('log');
const statusEl = document.getElementById('status');
const onlyChanges = document.getElementById('onlyChanges');
const looi = new Looi();
const last = {};
const textBuf = [];
let t0 = performance.now();
let streaming = false;

function stamp() { return (performance.now() - t0).toFixed(0).padStart(6) + 'ms'; }

// Auto-scroll ONLY if the user is already near the bottom of the log — never yank them down.
function addLine(cls, htmlBody, textBody) {
  const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 50;
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.innerHTML = htmlBody;
  logEl.appendChild(div);
  textBuf.push(textBody);
  if (atBottom) logEl.scrollTop = logEl.scrollHeight;   // scroll the LOG, not the window
}

function sys(msg, cls = 'ch-sys') {
  addLine(cls, `<span class="t">${stamp()}</span> ${msg}`, `${stamp()}  ${msg}`);
}

function onTelemetry(key, bytes) {
  const prev = last[key];
  const changed = !prev || prev.length !== bytes.length || bytes.some((b, i) => b !== prev[i]);
  last[key] = bytes.slice();
  if (onlyChanges.checked && !changed && prev) return;

  const hex = bytes.map((b, i) => {
    const s = b.toString(16).padStart(2, '0');
    return (prev && prev[i] !== b) ? `<span class="chg">${s}</span>` : s;
  }).join(' ');
  const hexPlain = bytes.map(b => b.toString(16).padStart(2, '0')).join(' ');
  addLine('ch-' + key,
    `<span class="t">${stamp()}</span> <b>${key}</b> [${bytes.length}]  ${hex}`,
    `${stamp()}  ${key}[${bytes.length}]  ${hexPlain}   dec:${bytes.join(',')}`);
}

looi.addEventListener('log',          e => sys(e.detail.msg, e.detail.cls === 'err' ? 'ch-err' : 'ch-sys'));
looi.addEventListener('connected',    () => { streaming = true; statusEl.textContent = '● connected — auto-streaming to Claude'; sys('=== CONNECTED ===', 'divider'); });
looi.addEventListener('disconnected', () => { streaming = false; statusEl.textContent = '○ disconnected'; sys('=== DISCONNECTED ===', 'ch-err'); });
looi.addEventListener('battery',      e => sys('battery ' + e.detail.value + '%'));
looi.addEventListener('telemetry',    e => onTelemetry(e.detail.key, e.detail.bytes));

document.getElementById('connect').onclick = async () => {
  statusEl.textContent = 'connecting…';
  try { await looi.connect(); } catch (e) { sys('connect failed: ' + e.message, 'ch-err'); statusEl.textContent = 'connect failed'; }
};
document.getElementById('disconnect').onclick = () => looi.disconnect();

document.querySelectorAll('button.mark').forEach(b =>
  b.onclick = () => addLine('divider', `<span class="t">${stamp()}</span> ── ${b.dataset.mark} ──`, `\n${stamp()}  ── ${b.dataset.mark} ──`));

document.getElementById('copy').onclick = async () => {
  try { await navigator.clipboard.writeText(textBuf.join('\n')); statusEl.textContent = '📋 copied ' + textBuf.length + ' lines'; }
  catch { statusEl.textContent = 'copy failed — long-press the log to select'; }
};
// Auto-stream to ntfy (like the Jarvis app): every 2.5s, POST any new lines. No button needed.
const NTFY = 'https://ntfy.sh/looi-dbg-r7k39q2x';
let sentIdx = 0, seq = 0, flushing = false;
async function flush(force) {
  if (flushing) return;
  if (!streaming && !force) return;
  const chunk = textBuf.slice(sentIdx);
  if (!chunk.length) { if (force) statusEl.textContent = 'nothing new to send'; return; }
  flushing = true;
  const end = textBuf.length;
  const body = chunk.join('\n');
  try {
    for (let i = 0; i < body.length; i += 1500) {
      seq++;
      await fetch(NTFY, { method: 'POST', headers: { Title: `looi-sensors #${seq}` }, body: body.slice(i, i + 1500) });
      await new Promise(r => setTimeout(r, 250));
    }
    sentIdx = end;
    statusEl.textContent = `📡 auto-streaming — ${end} lines sent`;
  } catch (e) { statusEl.textContent = 'stream err: ' + e.message; }
  finally { flushing = false; }
}
setInterval(() => flush(false), 2500);
document.getElementById('send').onclick = () => flush(true);

document.getElementById('clear').onclick = () => { logEl.innerHTML = ''; textBuf.length = 0; for (const k in last) delete last[k]; t0 = performance.now(); };

sys('ready. Tap Connect.');
</script>
</body>
</html>
