<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>LOOI · WebXR VIO spike</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: system-ui, sans-serif; }
  html, body { height: 100%; margin: 0; background: #0d1117; color: #e6edf3; }
  body { display: flex; flex-direction: column; }
  header { padding: 8px 12px; background: #161b22; border-bottom: 1px solid #30363d; font-size: 13px; }
  .bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 12px; }
  button { background: #21262d; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px;
           padding: 10px 12px; font-size: 13px; font-weight: 600; touch-action: manipulation; }
  button:active { background: #30363d; }
  button.primary { background: #238636; border-color: #2ea043; }
  button.drive  { background: #1d3a5f; border-color: #2b5c93; }
  button#stop   { background: #5a1e1e; border-color: #8a2a2a; }
  #pose { font-family: ui-monospace, Consolas, monospace; font-size: 15px; padding: 10px 12px;
          background: #0b2b1a; border: 1px solid #1a5c37; border-radius: 8px; margin: 0 12px; white-space: pre; }
  #log { flex: 1 1 auto; overflow-y: auto; padding: 8px 12px 24px; font-family: ui-monospace, Consolas, monospace;
         font-size: 12px; white-space: pre-wrap; color: #8b949e; }
  .ok { color: #7ee787; } .warn { color: #f0a020; } .err { color: #f85149; }
  /* DOM overlay shown during the immersive AR session */
  #overlay { position: fixed; inset: 0; display: none; flex-direction: column; justify-content: space-between;
             pointer-events: none; padding: 12px; }
  #overlay.on { display: flex; }
  #overlay > * { pointer-events: auto; }
  #xrpose { font-family: ui-monospace, Consolas, monospace; font-size: 16px; background: rgba(0,0,0,.55);
            padding: 10px; border-radius: 8px; white-space: pre; }
  #xrdrive { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  #xrdrive button { padding: 16px 8px; font-size: 16px; }
</style>
</head>
<body>
<header><b>LOOI · WebXR VIO spike</b> — can the phone track its own position while mounted on LOOI?</header>

<div class="bar">
  <button id="connect" class="primary">1 · Connect body</button>
  <button id="check">2 · Check WebXR</button>
  <button id="start" class="primary">3 · Start AR tracking</button>
</div>
<div id="pose">pose: (not tracking)</div>
<div class="bar">
  <span style="font-size:12px;color:#8b949e">Once in AR: drive with the on-screen pad, watch x/z change. Drive a known ~1m and check the number.</span>
</div>
<div id="log"></div>

<!-- Overlay that stays interactive DURING the immersive AR session -->
<div id="overlay">
  <div id="xrpose">starting…</div>
  <div>
    <div id="navstat" style="font-family:ui-monospace,monospace;font-size:14px;background:rgba(0,0,0,.6);padding:9px;border-radius:8px;margin-bottom:8px">nav: idle</div>
    <div id="xrnav" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px">
      <button id="savespot" style="flex:1 1 45%;background:#1f4d2e;border-color:#2ea043">◎ save spot</button>
      <button id="roam" style="flex:1 1 45%;background:#2d2a5f;border-color:#5b53c9">🎲 roam</button>
      <button id="gospot" style="flex:1 1 45%;background:#1d3a5f;border-color:#2b5c93">➤ go back</button>
      <button id="stopnav" style="flex:1 1 45%;background:#5a1e1e;border-color:#8a2a2a">◼ stop</button>
      <button id="voicebtn" style="flex:1 1 100%;background:#3d2a5f;border-color:#5c3b93">🎤 voice (say: roam / go back / stop)</button>
      <button id="capture" style="flex:1 1 100%;background:#1f4d4d;border-color:#2ea0a0">📸 capture (camera + pose + depth → Claude)</button>
    </div>
    <div id="xrdrive">
      <button></button><button class="drive" data-d="fwd">▲ fwd</button><button></button>
      <button class="drive" data-d="left">◀ left</button><button id="stop" data-d="stop">◼ stop</button><button class="drive" data-d="right">right ▶</button>
      <button></button><button class="drive" data-d="back">▼ back</button><button id="endar" style="background:#3d2a5f;border-color:#5c3b93">✕ end AR</button>
    </div>
  </div>
</div>

<script type="module">
import { Looi } from './looi.js?v=34';

const looi = new Looi();
const logEl = document.getElementById('log');
const poseEl = document.getElementById('pose');
const xrposeEl = document.getElementById('xrpose');
const overlay = document.getElementById('overlay');

function log(m, cls = '') {
  const t = (performance.now() / 1000).toFixed(1);
  logEl.insertAdjacentHTML('beforeend', `<div class="${cls}">${t}s  ${m}</div>`);
  logEl.scrollTop = logEl.scrollHeight;
}

// ---- Stream pose samples to the brain (same pipe sensors.html uses) so Claude can analyze the trajectory ----
const BRAIN = (() => { try { const ep = localStorage.getItem('brainEndpoint'); if (ep) return new URL(ep).origin; } catch {} return 'https://laptop-t1irqf8l.tail001138.ts.net'; })();
let streamBuf = [], sentIdx = 0, didReset = false, flushing = false;
async function flush() {
  if (flushing) return; const chunk = streamBuf.slice(sentIdx); if (!chunk.length) return;
  flushing = true; const end = streamBuf.length;
  try {
    const q = didReset ? '' : '?reset=1'; didReset = true;
    const r = await fetch(BRAIN + '/sensors' + q, { method: 'POST', body: chunk.join('\n') });
    if (r.ok) sentIdx = end;
  } catch {} finally { flushing = false; }
}
setInterval(flush, 3000);
const stream = line => streamBuf.push(line);

// ---- BLE connect + drive ----
looi.addEventListener('log', e => log(e.detail.msg, e.detail.cls === 'err' ? 'err' : ''));
document.getElementById('connect').onclick = async () => { try { await looi.connect(); log('body connected', 'ok'); } catch (e) { log('connect failed: ' + e.message, 'err'); } };

const DRIVE = {
  fwd:  () => looi.drive(80, 0), back: () => looi.drive(-80, 0),
  left: () => looi.drive(0, -90), right: () => looi.drive(0, 90), stop: () => looi.stop(),
};
function wireDrive(el) {
  el.querySelectorAll('[data-d]').forEach(b => {
    const fn = DRIVE[b.dataset.d]; if (!fn) return;
    b.addEventListener('pointerdown', e => { e.preventDefault(); fn(); });
    if (b.dataset.d !== 'stop') b.addEventListener('pointerup', () => looi.stop());
  });
}
wireDrive(overlay);

// ---- WebXR support check ----
document.getElementById('check').onclick = async () => {
  if (!('xr' in navigator)) { log('navigator.xr MISSING — WebXR not available in this browser', 'err'); return; }
  try {
    const ar = await navigator.xr.isSessionSupported('immersive-ar');
    log('immersive-ar supported: ' + ar, ar ? 'ok' : 'err');
    if (!ar) log('→ install/update "Google Play Services for AR" (ARCore), use Chrome', 'warn');
  } catch (e) { log('support check error: ' + e.message, 'err'); }
};

// ---- Start AR tracking ----
let xrSession = null, xrRefSpace = null, lost = false, t0 = 0, samples = 0;
let cur = { x: 0, z: 0, yaw: 0, ok: false };                  // latest VIO pose (updated every frame)
let obstacleAhead = null, obstacleT = 0, depthEnabled = false, depthErr = false;   // depth ahead (m) from the AR camera
let lastSx = 0, lastSz = 0, lastSyaw = 0;                     // last-streamed pose, for change-based logging
let xrGL = null, xrBinding = null, wantCapture = 0, capN = 0;   // diagnostic capture (camera readback + depth + pose)
function yaw(q) { return Math.atan2(2 * (q.w * q.y + q.x * q.z), 1 - 2 * (q.y * q.y + q.x * q.x)) * 180 / Math.PI; }
const norm2 = a => { while (a > 180) a -= 360; while (a < -180) a += 360; return a; };   // wrap degrees
const obAhead = () => (obstacleAhead != null && performance.now() - obstacleT < 600) ? obstacleAhead : null;   // fresh depth only — no stale

document.getElementById('start').onclick = async () => {
  if (!('xr' in navigator)) { log('no WebXR', 'err'); return; }
  const canvas = document.createElement('canvas');
  const gl = canvas.getContext('webgl', { xrCompatible: true });
  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
      optionalFeatures: ['local-floor', 'dom-overlay', 'depth-sensing', 'camera-access'],
      domOverlay: { root: overlay },
      depthSensing: { usagePreference: ['cpu-optimized'], dataFormatPreference: ['luminance-alpha', 'float32'] },
    });
  } catch (e) { log('requestSession failed: ' + e.message, 'err'); return; }
  const feats = Array.from(xrSession.enabledFeatures || []);
  depthEnabled = feats.includes('depth-sensing');
  log('AR features: ' + (feats.join(', ') || '(none listed)'), 'ok');
  log(depthEnabled ? 'depth-sensing: YES ✓ — paired avoidance ACTIVE' : 'depth-sensing: NO — nav only (blind ahead)', depthEnabled ? 'ok' : 'warn');
  stream('xr FEATURES ' + feats.join('|') + ' depth=' + depthEnabled);
  overlay.classList.add('on');
  await gl.makeXRCompatible();
  xrSession.updateRenderState({ baseLayer: new XRWebGLLayer(xrSession, gl) });
  xrGL = gl;
  try { xrBinding = new XRWebGLBinding(xrSession, gl); } catch (e) { log('no XRWebGLBinding: ' + e.message, 'warn'); }
  try { xrRefSpace = await xrSession.requestReferenceSpace('local-floor'); log('ref space: local-floor', 'ok'); }
  catch { xrRefSpace = await xrSession.requestReferenceSpace('local'); log('ref space: local (no floor)', 'warn'); }
  xrSession.addEventListener('end', () => { overlay.classList.remove('on'); xrSession = null; log(`AR ended (${samples} pose samples)`, 'warn'); stream(`xr END samples=${samples}`); flush(); });
  t0 = performance.now(); samples = 0; stream('xr START ' + new Date().toISOString());
  log('AR session started — drive LOOI and watch the pose', 'ok');
  xrSession.requestAnimationFrame(onFrame);
};
document.getElementById('endar').onclick = () => xrSession && xrSession.end();

let lastStream = 0;
function onFrame(t, frame) {
  const s = frame.session; s.requestAnimationFrame(onFrame);
  const pose = frame.getViewerPose(xrRefSpace);
  if (!pose) { if (!lost) { lost = true; log('TRACKING LOST', 'err'); stream('xr LOST t=' + ((performance.now() - t0) / 1000).toFixed(1)); } cur.ok = false; xrposeEl.textContent = '⚠ tracking lost'; return; }
  if (lost) { lost = false; log('tracking recovered', 'ok'); stream('xr RECOVER'); }
  samples++;
  const p = pose.transform.position, o = pose.transform.orientation;
  cur = { x: p.x, z: p.z, yaw: yaw(o), ok: true };            // live pose for the nav controller
  // --- depth ahead (rear camera faces the travel direction when driving rear-first) ---
  if (depthEnabled) {
    try {
      const di = frame.getDepthInformation(pose.views[0]);
      if (di) {
        let mn = Infinity;
        for (let vx = 0.35; vx <= 0.65; vx += 0.15) for (let vy = 0.45; vy <= 0.75; vy += 0.15) {
          const m = di.getDepthInMeters(vx, vy);
          if (m > 0.05 && m < mn) mn = m;                       // nearest thing in the central patch
        }
        obstacleAhead = isFinite(mn) ? mn : null;
        if (obstacleAhead != null) obstacleT = performance.now();   // timestamp for freshness
      }
    } catch (e) { if (!depthErr) { depthErr = true; log('depth read err: ' + e.message, 'warn'); } }
  }
  // --- diagnostic capture: grab camera image + depth grid + pose NOW (texture only valid this frame) ---
  if (wantCapture) {
    const view = pose.views[0];
    let img = null, grid = '(no depth)';
    try { if (depthEnabled) { const di = frame.getDepthInformation(view); if (di) grid = depthGrid(di); } } catch (e) {}
    try { img = grabCam(view); } catch (e) { log('cam grab err: ' + e.message, 'warn'); }
    sendDiag(wantCapture, img, grid, { x: +p.x.toFixed(3), z: +p.z.toFixed(3), yaw: +yaw(o).toFixed(1), ahead: obAhead() });
    log('capture #' + wantCapture + (img ? ' (with image)' : ' (NO image)'), img ? 'ok' : 'warn');
    wantCapture = 0;
  }
  const dist = Math.hypot(p.x, p.z);
  const oa = obAhead() != null ? obAhead().toFixed(2) + 'm' : '—';
  const txt = `x ${p.x.toFixed(2)}  z ${p.z.toFixed(2)}  yaw ${yaw(o).toFixed(0)}°\n|start| ${dist.toFixed(2)}m   ahead ${oa}`;
  xrposeEl.textContent = txt; poseEl.textContent = 'pose:\n' + txt;
  // change-based logging: only when LOOI actually moved/turned (kills the idle-frame spam)
  const now = performance.now();
  if ((Math.hypot(p.x - lastSx, p.z - lastSz) > 0.05 || Math.abs(norm2(yaw(o) - lastSyaw)) > 12) && now - lastStream > 400) {
    lastStream = now; lastSx = p.x; lastSz = p.z; lastSyaw = yaw(o);
    stream(`xr t=${((now - t0) / 1000).toFixed(1)} x=${p.x.toFixed(2)} z=${p.z.toFixed(2)} yaw=${yaw(o).toFixed(0)} ahead=${oa}`);
  }
}

// ================= Autonomous roam + return-to-spot (VIO closed-loop) =================
let target = null, navigating = false, roaming = false;
const ADV = -1;        // "advance" = drive rear-first, so the rear tracking camera leads (faces travel dir)
const STOP_M = 0.40;   // depth: stop when something is closer than this (meters) ahead
const navstat = document.getElementById('navstat');
const setNav = m => { navstat.textContent = 'nav: ' + m; };
const zzz = ms => new Promise(r => setTimeout(r, ms));
const norm = a => { while (a > Math.PI) a -= 2 * Math.PI; while (a < -Math.PI) a += 2 * Math.PI; return a; };
const distTo = t => Math.hypot(t.x - cur.x, t.z - cur.z);
const DEG = 180 / Math.PI;

document.getElementById('savespot').onclick = () => {
  if (!cur.ok) { setNav('can\'t save — no tracking'); return; }
  target = { x: cur.x, z: cur.z };
  setNav(`spot saved (${target.x.toFixed(2)}, ${target.z.toFixed(2)})`);
  stream(`nav SAVE x=${target.x.toFixed(3)} z=${target.z.toFixed(3)}`);
};
document.getElementById('stopnav').onclick = () => { roaming = navigating = false; looi.stop(); looi.disarmHazardWatch(); setNav('stopped'); stream('nav STOP'); };

// ---- Autonomous roam: smooth continuous legs, back off on physical bump/cliff (no jerky tapping) ----
async function roam() {
  if (roaming || navigating) return;
  if (!looi.connected) { setNav('connect body first'); return; }
  roaming = true; looi.disarmHazardWatch(); looi.armHazardWatch({ bumpAbs: 50 });   // bump OFF (it only detects drive-vibration); cliff still guards drops
  setNav('roaming…'); stream('nav ROAM start');
  try {
    while (roaming && looi.connected) {
      looi.hazard = null; looi.drive(ADV * 85, 0);            // rear-first advance (camera leads)
      const legEnd = performance.now() + 1500 + Math.random() * 2000;
      let hit = false;
      while (roaming && performance.now() < legEnd) {
        if (looi.hazard) { hit = 'cliff'; break; }
        const oa = obAhead(); if (oa != null && oa < STOP_M) { hit = 'depth ' + oa.toFixed(2) + 'm'; break; }
        await zzz(60);
      }
      looi.stop(); if (!roaming) break;
      if (hit) { stream('nav ROAM stop:' + hit); looi.drive(-ADV * 85, 0); await zzz(600); looi.stop(); }
      const dir = Math.random() < 0.5 ? -1 : 1;               // explore a new heading
      looi.drive(0, dir * 95); await zzz(hit ? 700 + Math.random() * 700 : 300 + Math.random() * 500);
      looi.stop(); await zzz(150);
    }
  } finally { roaming = false; looi.stop(); if (!navigating) looi.disarmHazardWatch(); setNav('roam stopped'); }
}

// ---- Return to the saved spot: steer off the STABLE yaw (calibrated once), drive in big clean legs ----
const rad = d => d / DEG;
async function driveSeg(ms, spd = 85) {
  const a = { x: cur.x, z: cur.z }, yawA = cur.yaw;
  looi.hazard = null; looi.drive(ADV * spd, 0);              // rear-first advance
  const end = performance.now() + ms; let blocked = false;
  while (performance.now() < end) {
    if (looi.hazard) { blocked = 'cliff'; stream('nav HAZ ' + looi.hazard); break; }
    const oa = obAhead(); if (oa != null && oa < STOP_M) { blocked = 'depth'; stream('nav DEPTH-STOP ' + oa.toFixed(2)); break; }
    await zzz(40);
  }
  looi.stop(); await zzz(350);                                // settle + let pose catch up
  const dx = cur.x - a.x, dz = cur.z - a.z, moved = Math.hypot(dx, dz);
  return { moved, travel: moved > 0.10 ? Math.atan2(dx, dz) : null, yawA, blocked };   // trust direction only on a real move
}
const turnCmd = async (dir, ms) => { looi.drive(0, dir * 90); await zzz(ms); looi.stop(); await zzz(350); };

async function goBack() {
  if (!target) { setNav('no spot saved yet'); return; }
  roaming = false; await zzz(200);
  if (!cur.ok) { setNav('no tracking'); return; }
  navigating = true; looi.disarmHazardWatch(); looi.armHazardWatch({ bumpAbs: 50 });   // bump OFF (drive-vibration noise); cliff still guards drops
  setNav('calibrating…'); stream('nav GOBACK');
  try {
    // calibrate the yaw→heading map from two clean forward legs around a turn (yaw is stable; motion is not)
    let s1 = null;
    for (let tries = 0; tries < 3 && navigating; tries++) {     // obstructed direction → turn and retry, don't just abort
      s1 = await driveSeg(1100);
      if (s1.travel != null) break;
      stream('nav CAL retry moved=' + s1.moved.toFixed(2) + (s1.blocked ? ' blk:' + s1.blocked : ''));
      await turnCmd(1, 650);
    }
    if (!navigating) return;
    if (!s1 || s1.travel == null) { setNav('can\'t get a clean move — obstructed?'); stream('nav ABORT no-motion'); return; }
    await turnCmd(1, 550); if (!navigating) return;
    const s2 = await driveSeg(1100); if (!navigating) return;
    let k = 1, turnDirSign = 1;
    if (s2.travel != null) {
      const dH = norm(s2.travel - s1.travel), dY = norm(rad(s2.yawA) - rad(s1.yawA));
      k = (Math.sign(dH) === Math.sign(dY)) ? 1 : -1;          // does travel-dir rotate WITH yaw or against it
      turnDirSign = Math.sign(dY) || 1;                        // which way +turn command moves yaw
    }
    const offset = norm(s1.travel - k * rad(s1.yawA));
    const headingNow = () => norm(k * rad(cur.yaw) + offset);  // robot-forward direction, from the STABLE yaw
    stream(`nav CAL k=${k} turnDirSign=${turnDirSign} offset=${(offset * DEG).toFixed(0)}`);

    let guard = 0, stuck = 0;
    while (navigating && guard++ < 40) {
      const d = distTo(target);
      setNav(`${d.toFixed(2)} m to spot`);
      stream(`nav STEP d=${d.toFixed(3)} pos=${cur.x.toFixed(2)},${cur.z.toFixed(2)} head=${(headingNow() * DEG).toFixed(0)}`);
      if (d < 0.30) { setNav(`✔ ARRIVED (${d.toFixed(2)} m off)`); stream('nav ARRIVED d=' + d.toFixed(3)); break; }
      const bearing = Math.atan2(target.x - cur.x, target.z - cur.z);
      const err = norm(bearing - headingNow());
      if (Math.abs(err) > 22 / DEG) {                          // reorient — converges because heading is now stable
        await turnCmd(Math.sign(err) * k * turnDirSign, Math.min(1000, Math.max(250, Math.abs(err) / Math.PI * 1200)));
      } else {
        const seg = await driveSeg(900);                       // big clean leg toward the spot
        if (seg.blocked) { setNav('obstacle → steering around'); stream('nav avoid-turn'); await turnCmd(turnDirSign, 500); }
        else if (seg.moved < 0.05) { if (++stuck >= 3) { setNav('stuck — no motion/tracking'); stream('nav STUCK'); break; } await turnCmd(turnDirSign, 450); }
        else stuck = 0;
      }
    }
    if (guard >= 40) { setNav('gave up after 40 steps'); stream('nav GIVEUP'); }
  } finally { navigating = false; looi.stop(); looi.disarmHazardWatch(); }
}
document.getElementById('roam').onclick = roam;
document.getElementById('gospot').onclick = goBack;

// ---- Voice: "roam" / "go back" / "stop" ----
document.getElementById('voicebtn').onclick = () => {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setNav('no speech recognition'); return; }
  const r = new SR(); r.lang = 'en-US'; r.interimResults = false; r.maxAlternatives = 1;
  setNav('🎤 listening…');
  r.onresult = e => {
    const said = (e.results[0][0].transcript || '').toLowerCase();
    log('heard: "' + said + '"', 'ok'); stream('nav VOICE "' + said + '"');
    if (/back|return|home|come/.test(said)) goBack();
    else if (/roam|wander|explore|random|go/.test(said)) roam();
    else if (/stop|halt|freeze/.test(said)) { roaming = navigating = false; looi.stop(); setNav('stopped'); }
    else setNav('didn\'t catch a command in: "' + said + '"');
  };
  r.onerror = e => setNav('voice error: ' + e.error);
  r.start();
};

// ---- Diagnostic capture: camera image + depth grid + pose → brain, for Claude to inspect ----
document.getElementById('capture').onclick = () => { if (!cur.ok) { setNav('no tracking — can\'t capture'); return; } capN++; wantCapture = capN; setNav('capturing #' + capN + '…'); };

function depthGrid(di) {                                       // sample depth (m) over a grid: rows=top→bottom, cols=left→right of the view
  const rows = [];
  for (let gy = 0.05; gy <= 0.96; gy += 0.15) {
    const row = [];
    for (let gx = 0.05; gx <= 0.96; gx += 0.1) {
      let m = NaN; try { m = di.getDepthInMeters(gx, gy); } catch (e) {}
      row.push((isFinite(m) && m > 0) ? m.toFixed(2).padStart(5) : '  -- ');
    }
    rows.push(row.join(' '));
  }
  return rows.join('\n');
}

function grabCam(view) {                                       // read the AR camera texture back to a JPEG (best-effort)
  if (!view.camera || !xrBinding || !xrGL) return null;
  const gl = xrGL, cam = view.camera, w = cam.width, h = cam.height;
  const tex = xrBinding.getCameraImage(cam);
  const fb = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fb);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  let data = null;
  if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE) { data = new Uint8Array(w * h * 4); gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, data); }
  else stream('diag: camera FBO incomplete (external texture — needs shader path)');
  gl.bindFramebuffer(gl.FRAMEBUFFER, null); gl.deleteFramebuffer(fb);
  if (!data) return null;
  const full = document.createElement('canvas'); full.width = w; full.height = h;
  const fctx = full.getContext('2d'), id = fctx.createImageData(w, h);
  for (let y = 0; y < h; y++) { const s = (h - 1 - y) * w * 4; id.data.set(data.subarray(s, s + w * 4), y * w * 4); }   // flip Y (GL is bottom-up)
  fctx.putImageData(id, 0, 0);
  const sw = 480, sh = Math.round(h * 480 / w);
  const sc = document.createElement('canvas'); sc.width = sw; sc.height = sh;
  sc.getContext('2d').drawImage(full, 0, 0, sw, sh);
  return sc.toDataURL('image/jpeg', 0.6).split(',')[1];
}

async function sendDiag(n, image, depth, pose) {
  try {
    const r = await fetch(BRAIN + '/diag', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ n, image, depth, pose, note: 'cap' + n }) });
    setNav(r.ok ? `capture #${n} sent ✓ ${image ? '(img)' : '(no img)'}` : `capture #${n} HTTP ${r.status}`);
  } catch (e) { setNav('capture send err: ' + e.message); }
}
